<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" width="900" height="430" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="430" fill="#0f172a"/>

  <text x="34" y="40" fill="#f1f5f9" font-size="18" font-weight="700">The conflict this system exists to resolve</text>
  <text x="34" y="62" fill="#94a3b8" font-size="12">A delivery made offline arrives three hours late, against a row the office changed in the meantime.</text>

  <!-- timeline axis -->
  <line x1="70" y1="150" x2="830" y2="150" stroke="#334155" stroke-width="2"/>

  <!-- 13:40 -->
  <circle cx="130" cy="150" r="6" fill="#f59e0b"/>
  <text x="130" y="132" fill="#fcd34d" font-size="12" font-weight="700" text-anchor="middle">13:40</text>
  <text x="130" y="180" fill="#cbd5e1" font-size="10.5" text-anchor="middle">signal lost</text>
  <text x="130" y="196" fill="#64748b" font-size="9.5" text-anchor="middle">Abu Ghraib</text>

  <!-- 14:02 -->
  <circle cx="330" cy="150" r="7" fill="#10b981"/>
  <text x="330" y="132" fill="#6ee7b7" font-size="12" font-weight="700" text-anchor="middle">14:02</text>
  <rect x="240" y="196" width="180" height="66" rx="8" fill="#064e3b" opacity="0.5" stroke="#10b981" stroke-width="1.3"/>
  <text x="330" y="216" fill="#a7f3d0" font-size="11" font-weight="600" text-anchor="middle">Parcel delivered</text>
  <text x="330" y="233" fill="#cbd5e1" font-size="9.5" text-anchor="middle">queued locally, offline</text>
  <text x="330" y="249" fill="#6ee7b7" font-size="9.5" text-anchor="middle">PHYSICAL — it happened</text>

  <!-- 14:30 -->
  <circle cx="530" cy="150" r="7" fill="#f87171"/>
  <text x="530" y="132" fill="#fca5a5" font-size="12" font-weight="700" text-anchor="middle">14:30</text>
  <rect x="440" y="60" width="180" height="66" rx="8" fill="#7f1d1d" opacity="0.42" stroke="#f87171" stroke-width="1.3"/>
  <text x="530" y="80" fill="#fecaca" font-size="11" font-weight="600" text-anchor="middle">Office reassigns job</text>
  <text x="530" y="97" fill="#cbd5e1" font-size="9.5" text-anchor="middle">assumes driver is stuck</text>
  <text x="530" y="113" fill="#fca5a5" font-size="9.5" text-anchor="middle">ADMIN — an intention</text>

  <!-- 17:00 -->
  <circle cx="740" cy="150" r="7" fill="#818cf8"/>
  <text x="740" y="132" fill="#c7d2fe" font-size="12" font-weight="700" text-anchor="middle">17:00</text>
  <text x="740" y="180" fill="#cbd5e1" font-size="10.5" text-anchor="middle">device syncs</text>
  <text x="740" y="196" fill="#64748b" font-size="9.5" text-anchor="middle">base_version is stale</text>

  <!-- arbitration -->
  <path d="M740,204 L740,246" stroke="#64748b" stroke-width="1.6" marker-end="url(#a2)"/>

  <rect x="34" y="288" width="832" height="104" rx="12" fill="#1e1b4b" opacity="0.55" stroke="#6366f1" stroke-width="1.5"/>
  <text x="54" y="314" fill="#c7d2fe" font-size="13" font-weight="700">Arbitration</text>

  <text x="54" y="340" fill="#e2e8f0" font-size="11.5">PHYSICAL (3) &gt; ADMIN (2) &gt; PROGRESS (1) &gt; INITIAL (0)</text>
  <text x="54" y="360" fill="#94a3b8" font-size="10.5">The delivery is a fact about the world. The reassignment is a plan about it. A plan that arrives after the</text>
  <text x="54" y="376" fill="#94a3b8" font-size="10.5">fact does not undo the fact — so the delivery stands and the dispatcher is told their edit was superseded.</text>

  <rect x="606" y="316" width="242" height="60" rx="9" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="727" y="340" fill="#86efac" font-size="13" font-weight="700" text-anchor="middle">field_wins</text>
  <text x="727" y="360" fill="#bbf7d0" font-size="10" text-anchor="middle">status: delivered · escalation: none</text>

  <text x="34" y="416" fill="#64748b" font-size="9.5">Equal-rank collisions with overlapping fields are escalated to a human. The resolver never guesses.</text>
</svg>
