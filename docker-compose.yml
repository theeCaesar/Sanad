services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sanad
      POSTGRES_PASSWORD: sanad
      POSTGRES_DB: sanad
    ports: ['5432:5432']
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sanad']
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 10

  kafka:
    image: bitnamilegacy/kafka:3.7
    ports: ['9092:9092']
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: 'yes'

  migrate:
    build: .
    command: node_modules/.bin/node-pg-migrate up -m src/db/migrations
    environment:
      DATABASE_URL: postgres://sanad:sanad@postgres:5432/sanad
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build: .
    ports: ['4000:4000']
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://sanad:sanad@postgres:5432/sanad
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_ACCESS_SECRET: dev-only-access-secret-do-not-use-in-prod
      JWT_REFRESH_SECRET: dev-only-refresh-secret-do-not-use-in-prod
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      PG_POOL_MAX: 60
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  outbox-publisher:
    healthcheck:
      disable: true
    build: .
    command: node src/workers/outboxPublisher.js
    environment:
      DATABASE_URL: postgres://sanad:sanad@postgres:5432/sanad
      KAFKA_BROKERS: kafka:9092
      PG_POOL_MAX: 5
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
    deploy:
      replicas: 2

  notification-consumer:
    healthcheck:
      disable: true
    build: .
    command: node src/workers/notificationConsumer.js
    environment:
      DATABASE_URL: postgres://sanad:sanad@postgres:5432/sanad
      KAFKA_BROKERS: kafka:9092
      CONSUMER_GROUP: sanad-notifications
      PG_POOL_MAX: 5
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }


  pricing:
    healthcheck:
      disable: true
    build: .
    command: node src/grpc/pricingServer.js
    environment:
      DATABASE_URL: postgres://sanad:sanad@postgres:5432/sanad
      PRICING_ADDR: 0.0.0.0:50051
      PG_POOL_MAX: 5
    ports: ['50051:50051']
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  prometheus:
    image: prom/prometheus:latest
    ports: ['9090:9090']
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports: ['3001:3000']
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports: ['16686:16686', '4318:4318']

volumes:
  pgdata:
