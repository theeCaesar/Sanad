apiVersion: v1
kind: Secret
metadata:
  name: sanad-secrets
  namespace: sanad
type: Opaque
stringData:
  database-url: 'postgres://USER:PASSWORD@HOST:5432/sanad?sslmode=require'
  jwt-access: 'GENERATE_ME'
  jwt-refresh: 'GENERATE_ME_DIFFERENTLY'
  r2-access-key-id: ''
  r2-secret-access-key: ''
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sanad-config
  namespace: sanad
data:
  redis-url: 'redis://sanad-redis:6379'
  kafka-brokers: 'sanad-kafka:9092'
  api-prefix: '/api/v1'
  sync-max-batch: '200'
