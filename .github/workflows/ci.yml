name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: theecaesar/sanad

jobs:
  secrets-scan:
    name: 'Gate 1 · No secrets in the repo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Scan history for committed credentials
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if an env file is tracked
        run: |
          if git ls-files | grep -E '(^|/)(\.env|config\.env)$'; then
            echo "::error::An environment file is tracked in git. Remove it, ROTATE every credential in it, and add it to .gitignore."
            exit 1
          fi
          echo "✓ no env files tracked"

  unit:
    name: 'Gate 2 · Unit tests'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - run: npm ci
      - run: npm run lint

      - name: Unit tests + coverage gate
        run: npm run test:coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: coverage, path: coverage/ }

  integration:
    name: 'Gate 3 · Integration (real Postgres)'
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Integration tests
        run: npm run test:integration

  security:
    name: 'Gate 4 · SAST + dependency audit'
    runs-on: ubuntu-latest
    needs: unit
    permissions: { security-events: write, contents: read }
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with: { languages: javascript }
      - uses: github/codeql-action/analyze@v3

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=critical

  build:
    name: 'Build & push image'
    runs-on: ubuntu-latest
    needs: [secrets-scan, unit, integration, security]
    if: github.ref == 'refs/heads/main'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan the built image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          severity: 'CRITICAL'
          exit-code: '1'

  deploy:
    name: 'Deploy (canary → full)'
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy canary (10%)
        run: |
          kubectl set image deployment/sanad-api-canary \
            api=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }} -n sanad
          kubectl rollout status deployment/sanad-api-canary -n sanad --timeout=3m

      - name: Watch the canary's error rate
        run: |
          echo "Watching canary for 2 minutes..."
          sleep 120
          ./scripts/check-canary.sh

      - name: Promote to 100%
        run: |
          kubectl set image deployment/sanad-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }} -n sanad
          kubectl set image deployment/sanad-outbox \
            worker=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }} -n sanad
          kubectl rollout status deployment/sanad-api -n sanad --timeout=5m

      - name: Roll back on failure
        if: failure()
        run: |
          echo "::error::Deploy failed — rolling back"
          kubectl rollout undo deployment/sanad-api-canary -n sanad
          kubectl rollout undo deployment/sanad-api -n sanad
